name: Gemini EXE Builder

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ১. কোড চেকআউট করা
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # ২. পাইথন সেটআপ করা
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.10'

      # ৩. প্রয়োজনীয় লাইব্রেরি ইনস্টল করা (pythonnet সহ)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview[gui] pythonnet

      # ৪. পাই-ইনস্টলার দিয়ে EXE তৈরি করা
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "Gemini_Rasel" main.py

      # ৫. তৈরি করা EXE ফাইলটি আপলোড করা
      - name: Upload Artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: Gemini-Software
          path: dist/Gemini_Rasel.exe
