name: SAE Book EXE Builder

on: [push] # তুমি কোড পুশ করলেই এটি রান হবে

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          # --onefile মানে একটি মাত্র ফাইল হবে
          # --noconsole মানে সফটওয়্যার ওপেন হলে কালো CMD বক্স আসবে না
          pyinstaller --onefile --noconsole --name "SAE_Book_App" main.py

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: SAE-Book-Software
          path: dist/*.exe
