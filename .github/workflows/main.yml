name: Gemini EXE Builder

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview[gui]

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "Gemini_App" main.py
          # মনে রেখো: তোমার পাইথন ফাইলের নাম যদি main.py না হয়, তবে এখানে সেটা বদলাও।

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Software
          path: dist/*.exe
