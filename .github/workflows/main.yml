name: Gemini EXE Builder

on: [push]

jobs:
  build:
    runs-on: windows-latest

    # Node.js 24 ব্যবহারের জন্য এনভায়রনমেন্ট ভ্যারিয়েবল সেট করা হয়েছে
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7 # লেটেস্ট মাইনর ভার্সন ব্যবহার করা নিরাপদ

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 থেকে v5 এ আপডেট করা হয়েছে যা Node 20+ সাপোর্ট করে
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview[gui]

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "Gemini_Rasel" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Software
          path: dist/*.exe
